<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VBS 2026 — Command Center</title>
<link href="https://fonts.googleapis.com/css2?family=Fredoka+One&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
/* ══════════════════════════════════════
   DESIGN TOKENS  (kids palette everywhere)
══════════════════════════════════════ */
:root {
  --navy:    #1A2744;
  --navy2:   #2A3F7A;
  --sun:     #FFD84D;
  --sky:     #4FC3F7;
  --grass:   #66BB6A;
  --coral:   #FF7043;
  --purple:  #9C6FDE;
  --teal:    #26C6DA;
  --pink:    #F48FB1;
  --amber:   #FFB300;
  --indigo:  #5C6BC0;
  --page-bg: #F0F7FF;
  --card-bg: #FFFFFF;
  --border:  #E4EDF8;
  --muted:   #7A8BAD;
  --green:   #4ADE80;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Nunito', sans-serif;
  background: var(--page-bg);
  color: var(--navy);
  min-height: 100vh;
  -webkit-font-smoothing: antialiased;
}

/* ══════════════════════════════════════
   HEADER
══════════════════════════════════════ */
.site-header {
  background: linear-gradient(135deg, var(--navy) 0%, var(--navy2) 100%);
  padding: 16px 24px;
  display: flex; flex-wrap: wrap; align-items: center;
  justify-content: space-between; gap: 12px;
  position: relative; overflow: hidden;
}
.site-header::before {
  content: '⛪🌟✝️🎉🌈';
  position: absolute; right: 20px; top: 50%; transform: translateY(-50%);
  font-size: 20px; letter-spacing: 6px; opacity: .12; pointer-events: none;
}
.site-title { font-family: 'Fredoka One', cursive; font-size: clamp(1.2rem,3vw,1.9rem); color: var(--sun); line-height: 1.1; }
.site-sub   { color: #A8C4E8; font-size: .78rem; margin-top: 3px; }
.header-right { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }

.live-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(74,222,128,.15); border: 1px solid rgba(74,222,128,.3);
  color: var(--green); font-size: .65rem; font-weight: 800; letter-spacing: .5px;
  padding: 4px 10px; border-radius: 99px;
}
.live-badge::before {
  content: ''; width: 6px; height: 6px; border-radius: 50%; flex-shrink: 0;
  background: var(--green); animation: blink 1.4s ease-in-out infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:.2} }

.ts { color: #A8C4E8; font-size: .7rem; white-space: nowrap; }
.btn-refresh {
  background: var(--sun); border: none; color: var(--navy);
  font-family: 'Nunito', sans-serif; font-size: .78rem; font-weight: 800;
  padding: 6px 14px; border-radius: 99px; cursor: pointer;
  transition: transform .15s, box-shadow .15s;
}
.btn-refresh:hover { transform: scale(1.05); box-shadow: 0 4px 12px rgba(255,216,77,.4); }

/* ══════════════════════════════════════
   TAB BAR
══════════════════════════════════════ */
.tab-bar {
  background: var(--navy);
  border-bottom: 1px solid rgba(255,255,255,.08);
  display: flex; padding: 0 24px; gap: 4px; overflow-x: auto;
}
.tab-btn {
  background: none; border: none; border-bottom: 3px solid transparent;
  color: #A8C4E8; font-family: 'Nunito', sans-serif; font-size: .85rem; font-weight: 700;
  padding: 12px 18px; cursor: pointer; white-space: nowrap;
  transition: color .15s, border-color .15s;
}
.tab-btn:hover  { color: #E2EAF4; }
.tab-btn.active { color: var(--sun); border-bottom-color: var(--sun); }

/* ══════════════════════════════════════
   PANELS
══════════════════════════════════════ */
.panel { display: none; background: var(--page-bg); }
.panel.active { display: block; }

/* ══════════════════════════════════════
   SHARED LAYOUT
══════════════════════════════════════ */
.page   { max-width: 1100px; margin: 0 auto; padding: 24px 16px 48px; }
.grid2  { display: grid; grid-template-columns: 1fr 1fr; gap: 18px; margin-bottom: 18px; }
.span2  { grid-column: 1 / -1; }

/* ══════════════════════════════════════
   SHARED STAT CARDS
══════════════════════════════════════ */
.stat-row {
  display: grid; grid-template-columns: repeat(4, 1fr);
  gap: 14px; margin-bottom: 24px;
}
.stat-row.five { grid-template-columns: repeat(5, 1fr); }

.stat-card {
  background: var(--card-bg); border-radius: 18px;
  padding: 20px 16px; text-align: center;
  box-shadow: 0 4px 18px rgba(26,39,68,.07);
  border-top: 4px solid var(--sky);
  transition: transform .2s;
}
.stat-card:hover { transform: translateY(-3px); }
.sc-coral   { border-top-color: var(--coral) !important; }
.sc-grass   { border-top-color: var(--grass) !important; }
.sc-purple  { border-top-color: var(--purple) !important; }
.sc-amber   { border-top-color: var(--amber) !important; }
.sc-indigo  { border-top-color: var(--indigo) !important; }
.sc-teal    { border-top-color: var(--teal) !important; }

.stat-n { font-family:'Fredoka One',cursive; font-size:clamp(1.8rem,5vw,2.6rem); line-height:1; color:var(--navy); }
.stat-l { font-size:.72rem; font-weight:700; color:var(--muted); text-transform:uppercase; letter-spacing:.8px; margin-top:5px; }
.stat-e { font-size:1.3rem; margin-bottom:6px; }

/* ══════════════════════════════════════
   SHARED CARD
══════════════════════════════════════ */
.card { background: var(--card-bg); border-radius: 18px; padding: 20px; box-shadow: 0 4px 18px rgba(26,39,68,.07); }
.card-title {
  font-family: 'Fredoka One', cursive; font-size: 1.2rem;
  color: var(--navy); margin-bottom: 14px;
  display: flex; align-items: center; gap: 8px;
}

/* ══════════════════════════════════════
   GRADE / ROLE BARS  (same style)
══════════════════════════════════════ */
.bar-row   { display:flex; align-items:center; gap:10px; margin-bottom:12px; }
.bar-lbl   { font-weight:700; font-size:.82rem; width:110px; color:var(--navy); flex-shrink:0; }
.bar-track { flex:1; background:#EEF3FB; border-radius:30px; height:24px; overflow:hidden; }
.bar-fill  { height:100%; border-radius:30px; display:flex; align-items:center; padding-left:8px; font-size:.72rem; font-weight:800; color:white; min-width:32px; transition: width 1s ease; }
.bar-n     { font-family:'Fredoka One',cursive; font-size:1rem; color:var(--navy); width:24px; text-align:right; flex-shrink:0; }

/* ══════════════════════════════════════
   DONUT
══════════════════════════════════════ */
.donut-wrap   { display:flex; align-items:center; justify-content:center; gap:20px; padding:8px 0; }
.legend       { display:flex; flex-direction:column; gap:9px; }
.legend-row   { display:flex; align-items:center; gap:7px; font-weight:700; font-size:.85rem; }
.legend-dot   { width:12px; height:12px; border-radius:50%; }

/* ══════════════════════════════════════
   FAMILY / VOLUNTEER CARDS  (same style)
══════════════════════════════════════ */
.person-list { display:flex; flex-direction:column; gap:10px; margin-top:14px; }
.person-card {
  border:2px solid var(--border); border-radius:14px;
  padding:14px 16px;
}

/* family row */
.fam-row   { display:flex; align-items:center; justify-content:space-between; gap:10px; }
.fam-name  { font-weight:800; font-size:.9rem; }
.fam-sub   { font-size:.74rem; color:var(--muted); margin-top:2px; }
.fam-count { background:var(--navy); color:var(--sun); font-family:'Fredoka One',cursive; font-size:1rem; padding:5px 12px; border-radius:30px; white-space:nowrap; }

/* volunteer card internals */
.vol-top   { display:flex; align-items:flex-start; justify-content:space-between; gap:8px; margin-bottom:10px; flex-wrap:wrap; }
.vol-name  { font-weight:800; font-size:.9rem; color:var(--navy); }
.vol-email { font-size:.72rem; color:var(--muted); margin-top:2px; }

.badge { display:inline-flex; align-items:center; gap:4px; padding:3px 10px; border-radius:99px; font-size:.68rem; font-weight:800; flex-shrink:0; }
.b-lead  { background:rgba(255,179,0,.12);  color:#b45309;  border:1px solid rgba(255,179,0,.35); }
.b-asst  { background:rgba(79,195,247,.12); color:#0369a1;  border:1px solid rgba(79,195,247,.35); }
.b-tbd   { background:rgba(156,111,222,.12);color:var(--purple); border:1px solid rgba(156,111,222,.3); }

.tag-row { display:flex; flex-wrap:wrap; gap:5px; margin-bottom:8px; }
.tag {
  display:inline-block; background:#F0F7FF;
  border:1px solid var(--border); border-radius:8px;
  padding:2px 8px; font-size:.68rem; font-weight:700; color:var(--navy);
}
.vol-foot { display:flex; flex-wrap:wrap; gap:6px; align-items:center; }
.vol-loc  { font-size:.68rem; color:var(--muted); }
.age-chip { font-size:.68rem; font-weight:700; padding:2px 9px; border-radius:99px; background:#EEF3FB; color:var(--navy); border:1px solid var(--border); }

/* ══════════════════════════════════════
   PILL ROW  (age, t-shirt)
══════════════════════════════════════ */
.pill-section-lbl { font-size:.7rem; font-weight:800; color:var(--muted); text-transform:uppercase; letter-spacing:.5px; margin-bottom:8px; }
.pill-row  { display:flex; flex-wrap:wrap; gap:7px; margin-bottom:14px; }
.pill      { display:inline-flex; align-items:center; gap:5px; background:var(--card-bg); border:2px solid var(--border); border-radius:99px; padding:5px 12px; font-size:.78rem; font-weight:700; color:var(--navy); }
.pill-dot  { width:8px; height:8px; border-radius:50%; flex-shrink:0; }
.pill-ct   { color:var(--muted); font-size:.7rem; }

/* ══════════════════════════════════════
   DAY AVAILABILITY BOXES
══════════════════════════════════════ */
.day-grid { display:grid; grid-template-columns:repeat(3,1fr); gap:12px; }
.day-box  {
  background:var(--page-bg); border:2px solid var(--border);
  border-radius:14px; padding:14px 12px; text-align:center;
}
.day-lbl  { font-size:.65rem; font-weight:800; text-transform:uppercase; letter-spacing:.5px; color:var(--muted); }
.day-date { font-size:.74rem; color:var(--navy); margin:4px 0 8px; font-weight:700; }
.day-num  { font-family:'Fredoka One',cursive; font-size:2rem; line-height:1; }
.day-names{ font-size:.64rem; color:var(--muted); margin-top:6px; line-height:1.65; word-break:break-word; font-weight:600; }

/* ══════════════════════════════════════
   TABLE  (shared style)
══════════════════════════════════════ */
.tbl-wrap  { overflow-x:auto; }
.tbl       { width:100%; border-collapse:collapse; font-size:.84rem; }
.tbl thead tr { background:var(--navy); color:white; }
.tbl th    { padding:9px 12px; text-align:left; font-weight:800; font-size:.72rem; text-transform:uppercase; letter-spacing:.4px; }
.tbl th:first-child{border-radius:10px 0 0 10px;} .tbl th:last-child{border-radius:0 10px 10px 0;}
.tbl tbody tr { border-bottom:1px solid var(--border); transition:background .12s; }
.tbl tbody tr:hover { background:#F5F9FF; }
.tbl td    { padding:9px 12px; vertical-align:middle; }

.chip { display:inline-block; padding:2px 9px; border-radius:20px; font-size:.7rem; font-weight:700; color:white; }
.chip-m { background:#DBEAFE; color:#1E40AF; display:inline-block; padding:2px 8px; border-radius:20px; font-size:.7rem; font-weight:700; }
.chip-f { background:#FCE7F3; color:#9D174D; display:inline-block; padding:2px 8px; border-radius:20px; font-size:.7rem; font-weight:700; }

/* ══════════════════════════════════════
   SEARCH BAR
══════════════════════════════════════ */
.search-bar { display:flex; align-items:center; gap:10px; flex-wrap:wrap; margin-bottom:16px; }
.search-wrap { position:relative; flex:1; min-width:200px; }
.search-icon { position:absolute; left:12px; top:50%; transform:translateY(-50%); font-size:.95rem; pointer-events:none; }
.search-input {
  width:100%; padding:9px 36px 9px 36px;
  border:2px solid var(--border); border-radius:99px;
  font-family:'Nunito',sans-serif; font-size:.85rem; font-weight:600;
  color:var(--navy); background:var(--page-bg);
  outline:none; transition:border-color .15s, box-shadow .15s;
}
.search-input:focus { border-color:var(--sky); box-shadow:0 0 0 3px rgba(79,195,247,.15); }
.search-input::placeholder { color:var(--muted); font-weight:600; }
.btn-clear {
  position:absolute; right:12px; top:50%; transform:translateY(-50%);
  background:none; border:none; cursor:pointer; font-size:.85rem;
  color:var(--muted); display:none; line-height:1; padding:2px 4px;
  border-radius:50%; transition:color .15s;
}
.btn-clear:hover { color:var(--coral); }
.btn-clear.vis { display:block; }
.search-count { font-size:.78rem; font-weight:700; color:var(--muted); white-space:nowrap; flex-shrink:0; }
.search-count strong { color:var(--navy); font-family:'Fredoka One',cursive; font-size:.95rem; }
.no-results { text-align:center; padding:32px 20px; color:var(--muted); font-weight:700; font-size:.9rem; }
.no-results .nr-icon { font-size:2rem; margin-bottom:8px; }
mark { background:#FFF3CD; border-radius:3px; padding:0 2px; font-style:normal; }

/* ══════════════════════════════════════
   LOADING / ERROR
══════════════════════════════════════ */
.spin { animation: spin 1s linear infinite; display:inline-block; }
@keyframes spin { to { transform: rotate(360deg); } }
.loading-box { text-align:center; padding:40px; color:var(--muted); font-weight:700; }
.err-box { background:#FFF0ED; border:2px solid var(--coral); border-radius:14px; padding:20px; color:var(--coral); font-weight:700; text-align:center; }

/* ══════════════════════════════════════
   RESPONSIVE
══════════════════════════════════════ */
@media(max-width:860px){
  .stat-row        { grid-template-columns:repeat(2,1fr); }
  .stat-row.five   { grid-template-columns:repeat(3,1fr); }
  .grid2           { grid-template-columns:1fr; }
  .span2           { grid-column:auto; }
}
@media(max-width:520px){
  .site-header     { padding:12px 14px; }
  .tab-bar         { padding:0 10px; }
  .tab-btn         { padding:10px 12px; font-size:.78rem; }
  .stat-row        { grid-template-columns:repeat(2,1fr); }
  .stat-row.five   { grid-template-columns:repeat(2,1fr); }
  .stat-row.five .stat-card:last-child { grid-column:1/-1; }
  .day-grid        { grid-template-columns:1fr; gap:8px; }
  .day-box         { display:flex; align-items:center; gap:12px; text-align:left; padding:12px 14px; }
  .day-num         { font-size:1.6rem; min-width:36px; }
  .page            { padding:14px 12px 36px; }
  .card            { padding:16px 14px; }
}
</style>
</head>
<body>

<!-- ─── HEADER ──────────────────────────────── -->
<header class="site-header">
  <div>
    <div class="site-title">⛪ VBS 2026 Command Center</div>
    <div class="site-sub">India Christian Assembly NJ · Live Registration &amp; Volunteer Monitor</div>
  </div>
  <div class="header-right">
    <span class="ts" id="ts"></span>
    <span class="live-badge">LIVE</span>
    <button class="btn-refresh" onclick="refreshAll()">↻ Refresh</button>
  </div>
</header>

<!-- ─── TABS ────────────────────────────────── -->
<nav class="tab-bar">
  <button class="tab-btn active" onclick="switchTab('kids',this)">🧒 Kids Registration</button>
  <button class="tab-btn"        onclick="switchTab('vol',this)">🙋 Volunteers</button>
</nav>

<!-- ─── KIDS PANEL ──────────────────────────── -->
<div id="panel-kids" class="panel active">
  <div class="page">
    <div id="k-stats" class="stat-row">
      <div class="loading-box" style="grid-column:1/-1"><span class="spin">⏳</span> Loading kids data…</div>
    </div>
    <div id="k-content"></div>
  </div>
</div>

<!-- ─── VOLUNTEER PANEL ─────────────────────── -->
<div id="panel-vol" class="panel">
  <div class="page">
    <div id="v-stats" class="stat-row five">
      <div class="loading-box" style="grid-column:1/-1"><span class="spin">⏳</span> Loading volunteer data…</div>
    </div>
    <div id="v-content"></div>
  </div>
</div>

<script>
/* ══════════════════════════════════════
   CONFIG
══════════════════════════════════════ */
const CSV_KIDS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vQI-vHJhZBtLtBBn94Eq_0beJYuNhywqgP4dpgpd0sjPfvPzgnLq8NtAAQvYTmN_0OBFpb7X1q-G20Y/pub?output=csv";
const CSV_VOLS = "https://docs.google.com/spreadsheets/d/e/2PACX-1vT1qao6oa4ze6Hzmy6q6DeltkBWYzgr8Dtp29zYROsFbjpxpOqNveYjU2cNbSbIVAfduJEYsrXh1v83/pub?output=csv";

/* ══════════════════════════════════════
   TABS
══════════════════════════════════════ */
function switchTab(name, btn) {
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelectorAll('.panel').forEach(p => p.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('panel-' + name).classList.add('active');
}

/* ══════════════════════════════════════
   CSV PARSER
══════════════════════════════════════ */
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = splitLine(lines[0]).map(h => h.trim().replace(/^"|"$/g,''));
  return lines.slice(1).filter(l => l.trim()).map(line => {
    const vals = splitLine(line);
    const obj = {};
    headers.forEach((h,i) => obj[h] = (vals[i]||'').trim().replace(/^"|"$/g,''));
    return obj;
  });
}
function splitLine(line) {
  const r=[]; let c='', q=false;
  for(let i=0;i<line.length;i++){
    if(line[i]==='"'){q=!q;}
    else if(line[i]===',' && !q){r.push(c);c='';}
    else c+=line[i];
  }
  r.push(c); return r;
}

/* ══════════════════════════════════════
   COLOUR HELPERS
══════════════════════════════════════ */
const GRADE_C = {'Pre':'#FF7043','K':'#FF9800','1st':'#FDD835','2nd':'#66BB6A','3rd':'#26C6DA','4th':'#42A5F5','5th':'#7E57C2','6th':'#EC407A','7th':'#8D6E63','8th':'#546E7A','default':'#9C6FDE'};
function gradeColor(g){ for(const k of Object.keys(GRADE_C)){ if(k!=='default'&&g&&g.includes(k)) return GRADE_C[k]; } return GRADE_C.default; }

const ROLE_C = {'Arts and Crafts':'#FF7043','Decoration':'#26C6DA','Media':'#42A5F5','Food':'#FF9800','Worship Team':'#9C6FDE','Bible Lessons':'#66BB6A','Medical Team':'#F06292','Crew Leader':'#EC407A','Recreation':'#26A69A','Registration':'#5C6BC0','Facility Management':'#FFB300','Facility Mangement':'#FFB300','default':'#7A8BAD'};
const SHIRT_C = ['#4FC3F7','#FF7043','#66BB6A','#9C6FDE','#FFB300','#26C6DA'];
const AGE_C   = {'19-30':'#4FC3F7','31-45':'#9C6FDE','46+':'#66BB6A','Under 18':'#FF7043'};
const DAY_COLORS = ['#26C6DA','#9C6FDE','#FF7043'];

/* ══════════════════════════════════════
   ── KIDS ──
══════════════════════════════════════ */
function extractChildren(rows){
  const kids=[];
  rows.forEach(r=>{
    const p=r["Parent's Full Name"]||'', ch=r["Church Name"]||'';
    const add=(n,g,gr,ts,al)=>{ if(n&&n.trim()) kids.push({name:n,gender:g||'',grade:gr||'',tshirt:ts||'',allergies:al||'None',parent:p,church:ch}); };
    add(r["Child #1 Name"],r["Gender"],r["Grade in Spetmber"],r["T Shirt Size"],r["Allergies"]);
    add(r["Child #2 Name"],r["Gender (1)"],r["Grade in Spetmber (1)"],r["T Shirt Size (1)"],r["Allergies (1)"]);
    add(r["Child #3 Name"],r["Gender (2)"],r["Grade in Spetmber (2)"],r["T Shirt Size (2)"],r["Allergies (2)"]);
  });
  return kids.filter(k=>k.name.trim());
}

function buildDonut(boys,girls,total){
  if(!total) return '';
  const r=56,cx=66,cy=66,circ=2*Math.PI*r;
  const bd=(boys/total)*circ, gd=(girls/total)*circ;
  return `<div class="donut-wrap">
    <svg width="132" height="132" viewBox="0 0 132 132">
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#EEF3FB" stroke-width="20"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#4FC3F7" stroke-width="20"
        stroke-dasharray="${bd} ${circ}" stroke-dashoffset="${circ/4}" stroke-linecap="round"/>
      <circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="#F48FB1" stroke-width="20"
        stroke-dasharray="${gd} ${circ}" stroke-dashoffset="${circ/4-bd}" stroke-linecap="round"/>
      <text x="${cx}" y="${cy}" text-anchor="middle" dominant-baseline="middle"
        font-family="Fredoka One,cursive" font-size="20" fill="#1A2744">${total}</text>
      <text x="${cx}" y="${cy+18}" text-anchor="middle" dominant-baseline="middle"
        font-family="Nunito,sans-serif" font-size="8" fill="#7A8BAD" font-weight="700">KIDS</text>
    </svg>
    <div class="legend">
      <div class="legend-row"><div class="legend-dot" style="background:#4FC3F7"></div>Boys — ${boys}</div>
      <div class="legend-row"><div class="legend-dot" style="background:#F48FB1"></div>Girls — ${girls}</div>
    </div>
  </div>`;
}

function renderKids(rows){
  const kids=extractChildren(rows);
  const total=kids.length;
  const boys=kids.filter(c=>c.gender.toLowerCase()==='male').length;
  const girls=kids.filter(c=>c.gender.toLowerCase()==='female').length;
  const gc={};
  kids.forEach(c=>{const g=c.grade.trim()||'Unknown';gc[g]=(gc[g]||0)+1;});
  const maxG=Math.max(...Object.values(gc),1);

  document.getElementById('k-stats').innerHTML=`
    <div class="stat-card"><div class="stat-e">🧒</div><div class="stat-n">${total}</div><div class="stat-l">Total Children</div></div>
    <div class="stat-card sc-coral"><div class="stat-e">👨‍👩‍👧</div><div class="stat-n">${rows.length}</div><div class="stat-l">Families</div></div>
    <div class="stat-card sc-grass"><div class="stat-e">👦</div><div class="stat-n">${boys}</div><div class="stat-l">Boys</div></div>
    <div class="stat-card sc-purple"><div class="stat-e">👧</div><div class="stat-n">${girls}</div><div class="stat-l">Girls</div></div>`;

  const gradeBars=Object.entries(gc).sort((a,b)=>b[1]-a[1]).map(([g,n])=>`
    <div class="bar-row">
      <div class="bar-lbl">${g}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${n/maxG*100}%;background:${gradeColor(g)}">${n} kid${n>1?'s':''}</div></div>
      <div class="bar-n">${n}</div>
    </div>`).join('');

  const famMap={};
  kids.forEach(c=>{if(!famMap[c.parent])famMap[c.parent]={parent:c.parent,church:c.church,count:0};famMap[c.parent].count++;});
  const famCards=Object.values(famMap).sort((a,b)=>b.count-a.count).map(f=>`
    <div class="person-card">
      <div class="fam-row">
        <div><div class="fam-name">👨‍👩‍👧 ${f.parent}</div><div class="fam-sub">⛪ ${f.church}</div></div>
        <div class="fam-count">${f.count} child${f.count>1?'ren':''}</div>
      </div>
    </div>`).join('');

  const tRows=kids.map(c=>buildKidsRow(c,'')).join('');

  document.getElementById('k-content').innerHTML=`
    <div class="grid2">
      <div class="card">
        <div class="card-title">📊 Kids by Grade</div>
        ${gradeBars||'<p style="color:var(--muted)">No grade data</p>'}
      </div>
      <div class="card">
        <div class="card-title">⚧ Gender Breakdown</div>
        ${buildDonut(boys,girls,total)}
        <div class="card-title" style="font-size:1rem;margin-top:18px;margin-bottom:0">👨‍👩‍👧 Families</div>
        <div class="person-list">${famCards}</div>
      </div>
    </div>
    <div class="card span2">
      <div class="card-title" style="margin-bottom:14px">🧒 All Registered Children</div>
      <div class="search-bar">
        <div class="search-wrap">
          <span class="search-icon">🔍</span>
          <input class="search-input" id="k-search" type="text" placeholder="Search by child or parent name…" oninput="filterKidsTable(this.value)">
          <button class="btn-clear" id="k-clear" onclick="clearKidsSearch()" title="Clear search">✕</button>
        </div>
        <div class="search-count" id="k-count"><strong>${total}</strong> of ${total} children</div>
      </div>
      <div class="tbl-wrap">
        <table class="tbl" id="k-table">
          <thead><tr><th>Name</th><th>Grade</th><th>Gender</th><th>T-Shirt</th><th>Allergies</th><th>Parent</th></tr></thead>
          <tbody id="k-tbody">${tRows}</tbody>
        </table>
        <div class="no-results" id="k-no-results" style="display:none">
          <div class="nr-icon">🔎</div>
          <div>No children found matching your search</div>
        </div>
      </div>
    </div>`;
  // store kids globally for search
  window._allKids = kids;
}

function buildKidsRow(c, query='') {
  const hl = (str) => {
    if (!query || !str) return str || '';
    const re = new RegExp(`(${query.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi');
    return str.replace(re, '<mark>$1</mark>');
  };
  return `<tr>
    <td><strong>${hl(c.name)}</strong></td>
    <td><span class="chip" style="background:${gradeColor(c.grade)}">${c.grade||'—'}</span></td>
    <td><span class="${c.gender.toLowerCase()==='male'?'chip-m':'chip-f'}">${c.gender}</span></td>
    <td>${c.tshirt||'—'}</td>
    <td>${c.allergies||'None'}</td>
    <td style="color:var(--muted);font-size:.78rem">${hl(c.parent)}</td>
  </tr>`;
}

function filterKidsTable(query) {
  const kids = window._allKids || [];
  const q = query.trim().toLowerCase();
  const clearBtn = document.getElementById('k-clear');
  const countEl  = document.getElementById('k-count');
  const tbody    = document.getElementById('k-tbody');
  const noRes    = document.getElementById('k-no-results');
  const table    = document.getElementById('k-table');

  if (clearBtn) clearBtn.classList.toggle('vis', q.length > 0);

  const filtered = q
    ? kids.filter(c => c.name.toLowerCase().includes(q) || c.parent.toLowerCase().includes(q))
    : kids;

  if (tbody) tbody.innerHTML = filtered.map(c => buildKidsRow(c, q)).join('');

  if (countEl) countEl.innerHTML = `<strong>${filtered.length}</strong> of ${kids.length} children`;

  if (noRes && table) {
    noRes.style.display  = filtered.length === 0 ? 'block' : 'none';
    table.style.display  = filtered.length === 0 ? 'none'  : '';
  }
}

function clearKidsSearch() {
  const inp = document.getElementById('k-search');
  if (inp) { inp.value = ''; inp.focus(); }
  filterKidsTable('');
}

async function loadKids(){
  document.getElementById('k-stats').innerHTML=`<div class="loading-box" style="grid-column:1/-1"><span class="spin">⏳</span> Loading…</div>`;
  document.getElementById('k-content').innerHTML='';
  try{
    const res=await fetch(CSV_KIDS+'&t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    renderKids(parseCSV(await res.text()));
  }catch(e){
    document.getElementById('k-stats').innerHTML=`<div class="err-box" style="grid-column:1/-1">⚠️ Could not load kids data.<br><small>${e.message}</small></div>`;
  }
}

/* ══════════════════════════════════════
   ── VOLUNTEERS ──
══════════════════════════════════════ */
const DAY_INFO=[
  {key:'July 9', label:'Day 1',date:'July 9 · Thu'},
  {key:'July 10',label:'Day 2',date:'July 10 · Fri'},
  {key:'July 11',label:'Day 3',date:'July 11 · Sat'}
];

function mapVol(row){
  const get=(...keys)=>{
    for(const k of keys){const f=Object.keys(row).find(h=>h.toLowerCase().includes(k.toLowerCase()));if(f&&row[f])return row[f];}
    return '';
  };
  const name=get("what's your name","name");
  if(!name) return null;
  return {
    name, email:get("email"), city:get("city"), state:get("state"),
    age:get("age"), church:get("church"), tshirt:get("t - shirt","t-shirt","shirt"),
    days:get("day(s) available","days available","available").split(',').map(d=>d.trim()).filter(Boolean),
    roles:get("type of volunteer","volunteer work").split(',').map(r=>r.trim()).filter(Boolean),
    level:get("lead or an assistant","lead or assistant","lead")
  };
}

function renderVols(vols){
  const total=vols.length;
  const leads=vols.filter(v=>v.level.toLowerCase().includes('lead')).length;
  const assists=vols.filter(v=>v.level.toLowerCase().includes('assistant')).length;
  const allDays=vols.filter(v=>v.days.length>=3).length;
  const rm={};
  vols.forEach(v=>v.roles.forEach(r=>{if(r)rm[r]=(rm[r]||0)+1;}));

  document.getElementById('v-stats').innerHTML=`
    <div class="stat-card"><div class="stat-e">🙋</div><div class="stat-n">${total}</div><div class="stat-l">Volunteers</div></div>
    <div class="stat-card sc-amber"><div class="stat-e">⭐</div><div class="stat-n">${leads}</div><div class="stat-l">Leaders</div></div>
    <div class="stat-card sc-teal"><div class="stat-e">🤝</div><div class="stat-n">${assists}</div><div class="stat-l">Assistants</div></div>
    <div class="stat-card sc-purple"><div class="stat-e">📅</div><div class="stat-n">${allDays}</div><div class="stat-l">All 3 Days</div></div>
    <div class="stat-card sc-indigo"><div class="stat-e">🎯</div><div class="stat-n">${Object.keys(rm).length}</div><div class="stat-l">Role Types</div></div>`;

  /* day boxes */
  const dayBoxes=DAY_INFO.map((d,i)=>{
    const dv=vols.filter(v=>v.days.some(x=>x.includes(d.key)));
    return `<div class="day-box">
      <div class="day-lbl">${d.label}</div>
      <div class="day-date">${d.date}</div>
      <div class="day-num" style="color:${DAY_COLORS[i]}">${dv.length}</div>
      <div class="day-names">${dv.map(v=>v.name.split(' ')[0]).join(' · ')}</div>
    </div>`;
  }).join('');

  /* role bars */
  const sorted=Object.entries(rm).sort((a,b)=>b[1]-a[1]);
  const maxR=sorted[0]?.[1]||1;
  const roleBars=sorted.map(([r,c])=>`
    <div class="bar-row">
      <div class="bar-lbl">${r}</div>
      <div class="bar-track"><div class="bar-fill" style="width:${c/maxR*100}%;background:${ROLE_C[r]||ROLE_C.default}">${c} vol${c>1?'s':''}</div></div>
      <div class="bar-n">${c}</div>
    </div>`).join('');

  /* age pills */
  const ac={};
  vols.forEach(v=>{if(v.age)ac[v.age]=(ac[v.age]||0)+1;});
  const agePills=Object.entries(ac).map(([a,c])=>`
    <div class="pill"><div class="pill-dot" style="background:${AGE_C[a]||'#7A8BAD'}"></div>${a} <span class="pill-ct">(${c})</span></div>`).join('');

  /* shirt pills */
  const shc={};
  vols.forEach(v=>{const s=(v.tshirt||'').replace(/\(adult\)/i,'').trim();if(s)shc[s]=(shc[s]||0)+1;});
  const shirtPills=Object.entries(shc).sort((a,b)=>b[1]-a[1]).map(([s,c],i)=>`
    <div class="pill"><div class="pill-dot" style="background:${SHIRT_C[i%SHIRT_C.length]}"></div>${s} <span class="pill-ct">×${c}</span></div>`).join('');

  /* volunteer cards */
  const volCards=vols.map(v=>{
    const lv=v.level.toLowerCase();
    const badge=lv.includes('lead')?`<span class="badge b-lead">⭐ Lead</span>`:lv.includes('assistant')?`<span class="badge b-asst">🤝 Assistant</span>`:`<span class="badge b-tbd">— TBD</span>`;
    const dayTags=v.days.map(d=>{const n=d.includes('July 9')?'1':d.includes('July 10')?'2':d.includes('July 11')?'3':d;return `<span class="tag">Day ${n}</span>`;}).join('');
    const roleTags=v.roles.map(r=>`<span class="tag">${r}</span>`).join('');
    return `<div class="person-card">
      <div class="vol-top">
        <div><div class="vol-name">${v.name}</div><div class="vol-email">${v.email}</div></div>
        ${badge}
      </div>
      <div class="tag-row">${dayTags||'<span class="tag" style="opacity:.5">—</span>'}</div>
      <div class="tag-row">${roleTags||'<span class="tag" style="opacity:.5">No role</span>'}</div>
      <div class="vol-foot">
        ${v.age?`<span class="age-chip">${v.age}</span>`:''}
        ${v.city?`<span class="vol-loc">📍 ${v.city}${v.state?', '+v.state:''}</span>`:''}
        ${v.tshirt?`<span class="vol-loc">👕 ${v.tshirt}</span>`:''}
      </div>
    </div>`;
  }).join('');

  document.getElementById('v-content').innerHTML=`
    <div class="grid2">
      <div class="card">
        <div class="card-title">📅 Availability by Day</div>
        <div class="day-grid">${dayBoxes}</div>
      </div>
      <div class="card">
        <div class="card-title">👥 Age Groups &amp; T-Shirts</div>
        <div class="pill-section-lbl">Age Range</div>
        <div class="pill-row">${agePills||'<span style="color:var(--muted)">No data</span>'}</div>
        <div class="pill-section-lbl">T-Shirt Sizes</div>
        <div class="pill-row">${shirtPills||'<span style="color:var(--muted)">No data</span>'}</div>
      </div>
      <div class="card span2">
        <div class="card-title">🎯 Volunteer Roles Breakdown</div>
        ${roleBars||'<p style="color:var(--muted)">No role data</p>'}
      </div>
      <div class="card span2">
        <div class="card-title">🙋 All Volunteers <span style="color:var(--muted);font-size:.85rem;font-family:Nunito,sans-serif;font-weight:600">(${total})</span></div>
        <div class="person-list">${volCards}</div>
      </div>
    </div>`;
}

async function loadVols(){
  document.getElementById('v-stats').innerHTML=`<div class="loading-box" style="grid-column:1/-1"><span class="spin">⏳</span> Loading…</div>`;
  document.getElementById('v-content').innerHTML='';
  try{
    const res=await fetch(CSV_VOLS+'&t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    const vols=parseCSV(await res.text()).map(mapVol).filter(Boolean);
    if(!vols.length) throw new Error('No rows found — check headers');
    renderVols(vols);
  }catch(e){
    document.getElementById('v-stats').innerHTML=`<div class="err-box" style="grid-column:1/-1">⚠️ Could not load volunteer data.<br><small>${e.message}</small><br><button class="btn-refresh" onclick="loadVols()" style="margin-top:10px">↻ Try Again</button></div>`;
  }
}

/* ══════════════════════════════════════
   INIT
══════════════════════════════════════ */
function refreshAll(){
  loadKids(); loadVols();
  document.getElementById('ts').textContent = 'Updated '+new Date().toLocaleTimeString([],{hour:'2-digit',minute:'2-digit'});
}
refreshAll();
setInterval(refreshAll, 120000);
</script>
