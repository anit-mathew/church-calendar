<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width,initial-scale=1" />
<title>ICANJ Church Calendar</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/PapaParse/5.4.1/papaparse.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;800&family=Open+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css" />
</head>
<body>

<div class="app">

  <header class="header">
    <div class="header-inner">
      <div class="brand">
        <div class="brand-logo">
          <span class="brand-ica">ICA</span><span class="brand-nj">NJ</span>
        </div>
        <div class="brand-sub">CHURCH</div>
      </div>
      <div class="header-label">Event Calendar</div>
    </div>
  </header>

  <main class="main">

    <div class="calendar-card">
      <div class="cal-nav">
        <button class="nav-btn" id="prevMonthBtn">&#8592;</button>
        <div class="cal-nav-selects">
          <select id="monthSelect"></select>
          <select id="yearSelect"></select>
        </div>
        <button class="nav-btn" id="nextMonthBtn">&#8594;</button>
      </div>

      <div class="weekday-row">
        <span>Sun</span><span>Mon</span><span>Tue</span><span>Wed</span>
        <span>Thu</span><span>Fri</span><span>Sat</span>
      </div>

      <div class="calendar-grid" id="calendarGrid"></div>
    </div>

    <div class="side-panel">
      <div class="panel-header">
        <div class="panel-date" id="panelDate">Select a date</div>
        <button id="fullMonthBtn" class="toggle-btn">Month View</button>
      </div>
      <div class="panel-body" id="panelList">
        <div class="no-events">← Tap a day to see events</div>
      </div>
    </div>

  </main>

  <footer class="footer">
    <span>✦ We exist to help others grow toward God</span>
  </footer>

</div>

<script src="assets/js/calendar.js"></script>
</body>
</html>
